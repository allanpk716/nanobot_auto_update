<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nanobot 实例列表</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Nanobot 实例列表</h1>
            <span id="header-version" class="header-version-badge">v--</span>
        </div>
    </header>

    <section id="selfupdate-section" class="selfupdate-section">
        <div class="selfupdate-header">
            <span class="selfupdate-title">自更新管理</span>
            <span id="current-version" class="version-badge">--</span>
        </div>
        <div class="selfupdate-actions">
            <button id="btn-check-update" class="btn-selfupdate">检测更新</button>
            <button id="btn-start-update" class="btn-selfupdate" disabled>立即更新</button>
        </div>
        <div id="update-result" class="update-result"></div>
    </section>

    <main>
        <div class="page-actions">
            <button id="btn-new-instance" class="btn-primary">+ 新建实例</button>
        </div>
        <div id="instances-grid" class="instances-grid">
            <!-- Instance cards will be loaded here -->
            <div class="empty-state">
                <h2>加载中...</h2>
                <p>正在获取实例列表</p>
            </div>
        </div>
    </main>

    <div id="modal-container" class="modal-overlay" style="display:none">
        <div class="modal-dialog">
            <div class="modal-header">
                <h2 id="modal-title"></h2>
                <button id="modal-close" class="modal-close-btn">&times;</button>
            </div>
            <div id="modal-body" class="modal-body"></div>
            <div id="modal-footer" class="modal-footer"></div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="/static/home.js"></script>
</body>
</html>
