# Nanobot Auto Updater Configuration (v0.3+)

# HTTP API 服务配置（v0.3 新增，推荐）
api:
  port: 8080                    # API 服务端口
  bearer_token: "change-this-to-your-secret-token-at-least-32-characters"  # 认证令牌（必填，≥32字符）
  timeout: 30s                  # 请求超时时间

# 监控服务配置（v0.3 新增，推荐）
monitor:
  interval: 15m                 # Google 连通性检查间隔
  timeout: 10s                  # HTTP 请求超时

# 多实例配置（v0.2+ 引入，必需）
# 至少需要配置一个实例
instances:
  - name: "nanobot-instance-1"
    port: 18790
    start_command: "nanobot gateway"
    startup_timeout: 30s

# Pushover 通知设置（可选）
pushover:
  api_token: "aqquyv31y73mzh9k3qfptpd1zyi73z"
  user_key: "uw3b9cbopa5jn843xqxwknzcbjzoe5"
